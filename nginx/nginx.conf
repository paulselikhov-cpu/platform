# БЛОК EVENTS - настройка обработки соединений
events {
    # Максимальное количество одновременных соединений на один рабочий процесс
    # 1024 - достаточно для локальной разработки
    worker_connections 1024;
}

# БЛОК HTTP - основная конфигурация веб-сервера
http {
    # Подключаем файл с типами файлов (mime.types)
    # Этот файл говорит Nginx, какой Content-Type отдавать для разных расширений
    # Например: .css -> text/css, .js -> application/javascript, .png -> image/png
    include /etc/nginx/mime.types;
    
    # Тип файлов по умолчанию, если расширение не найдено в mime.types
    # application/octet-stream - бинарный поток, браузер предложит скачать файл
    default_type application/octet-stream;

    # Включаем эффективную отправку файлов
    # Позволяет Nginx отправлять файлы напрямую из диска в сеть, минуя лишние копирования в памяти
    # Ускоряет отдачу статики (CSS, JS, картинки)
    sendfile on;
    
    # Таймаут для keep-alive соединений (в секундах)
    # Сколько времени Nginx держит соединение открытым после последнего запроса
    # 65 секунд - стандартное значение, позволяет переиспользовать соединение для нескольких запросов
    # Это ускоряет загрузку страницы, т.к. не нужно открывать новое соединение для каждого файла
    keepalive_timeout 65;

    # БЛОК SERVER - настройка виртуального сервера
    server {
        # Порт, на котором Nginx слушает входящие запросы
        # 80 - стандартный порт для HTTP
        listen 80;
        
        # Имя сервера (домен)
        # localhost - для локальной разработки
        server_name localhost;

        # Корневая директория, где лежат файлы сайта
        # /usr/share/nginx/html - стандартная папка Nginx внутри контейнера
        root /usr/share/nginx/html;
        
        # Файл, который отдаётся по умолчанию при запросе к папке
        # Например, при запросе / отдастся /usr/share/nginx/html/index.html
        index index.html;

        # ОБРАБОТКА КОРНЯ САЙТА
        # location / - обрабатывает все запросы к корню и подпапкам
        location / {
            # Пытается найти файл в следующем порядке:
            # 1. $uri - запрошенный файл (например /about.html)
            # 2. $uri/ - если это папка, ищет index.html внутри
            # 3. /index.html - если ничего не найдено, отдаёт index.html
            # Это нужно для SPA (Single Page Application) - все запросы отдают index.html
            # а Angular уже сам обрабатывает маршруты на клиенте
            try_files $uri $uri/ /index.html;
        }

        location /platform/ {
            alias /usr/share/nginx/platform/;
            try_files $uri $uri/ /platform/index.html;
            
            # Кеширование статики
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ПРИЛОЖЕНИЕ CHAT
        location /chat/ {
            alias /usr/share/nginx/chat/;
            try_files $uri $uri/ /chat/index.html;
            
            # Кеширование статики
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ОБРАБОТКА API ЗАПРОСОВ
        # location /api/ - перехватывает все запросы, начинающиеся с /api/
        location /api/ {
            # Прокси (перенаправляет) запросы на бэкенд-сервер
            # host.docker.internal - специальный адрес внутри Docker, указывает на хост-машину
            # :8080 - порт, на котором работает ваш бэкенд
            # Все запросы к /api/ перенаправляются на http://host.docker.internal:8080/api/
            proxy_pass http://host.docker.internal:8080/api/;
            
            # Передаём оригинальный заголовок Host от клиента
            proxy_set_header Host $host;
            
            # Передаём реальный IP-адрес клиента
            proxy_set_header X-Real-IP $remote_addr;
            
            # Передаём цепочку IP-адресов (если запрос прошел через несколько прокси)
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Передаём протокол (http/https), который использовал клиент
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ОБРАБОТКА WEBSOCKET
        # location /ws/ - перехватывает запросы к WebSocket
        location /ws {
            # Перенаправляет на бэкенд-сервер
            proxy_pass http://host.docker.internal:8080/ws;
            
            # Используем HTTP/1.1 для WebSocket (требуется для Upgrade)
            proxy_http_version 1.1;
            
            # Передаём заголовок Upgrade (нужен для переключения протокола на WebSocket)
            proxy_set_header Upgrade $http_upgrade;
            
            # Передаём заголовок Connection: Upgrade (подтверждаем переключение)
            proxy_set_header Connection "Upgrade";
            
            # Передаём оригинальный Host
            proxy_set_header Host $host;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;   # держим соединение открытым 1 час
            proxy_send_timeout 3600s;
        }

        location /babich-chat/ {
            alias /usr/share/nginx/babich-chat/;
            try_files $uri $uri/ /babich-chat/index.html;
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # КЕШИРОВАНИЕ СТАТИЧЕСКИХ ФАЙЛОВ
        # location ~* - обрабатывает все файлы с указанными расширениями
        # ~* означает "регистронезависимое регулярное выражение"
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            # Устанавливаем время кеширования в браузере - 1 год
            expires 1y;
            
            # Добавляем заголовок Cache-Control
            # public - файл может кешироваться любым прокси
            # immutable - файл никогда не меняется (если изменится - изменится имя файла)
            add_header Cache-Control "public, immutable";
        }

        # НАСТРОЙКА ЛОГОВ
        # Путь к файлу access.log - логи всех запросов к серверу
        access_log /var/log/nginx/access.log;
        
        # Путь к файлу error.log - логи ошибок
        error_log /var/log/nginx/error.log;
    }
}